name: ETL Oracle - JSON

on:
  schedule:
    - cron: "*/3 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  etl:
    runs-on: self-hosted

    steps:
      - name: Checkout do repositorio
        uses: actions/checkout@v4

      - name: Instalar dependencias Python
        run: pip install -r requirements.txt

      - name: Rodar ETL
        env:
          DB_USER:                  ${{ secrets.DB_USER }}
          DB_PASSWORD:              ${{ secrets.DB_PASSWORD }}
          DB_DSN:                   ${{ secrets.DB_DSN }}
          DB_MIN_CONNECTIONS:       ${{ secrets.DB_MIN_CONNECTIONS }}
          DB_MAX_CONNECTIONS:       ${{ secrets.DB_MAX_CONNECTIONS }}
          DB_INCREMENT_CONNECTIONS: ${{ secrets.DB_INCREMENT_CONNECTIONS }}
          ORACLE_CLIENT_PATH:       ${{ secrets.ORACLE_CLIENT_PATH }}
        run: python etl.py

      - name: Commitar JSONs gerados
        shell: powershell
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          Write-Host "Arquivos em data/"
          Get-ChildItem data\ -ErrorAction SilentlyContinue | Format-Table Name, Length

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:$env:GITHUB_TOKEN@github.com/contadoria2026/db-dashboard-gdf.git"

          git add data/saldo_funcao_subfuncao.json data/receita.json
          Write-Host "git add codigo de saida: $LASTEXITCODE"

          Write-Host "git status:"
          git status

          git diff --staged --quiet
          if ($LASTEXITCODE -ne 0) {
            $date = (Get-Date).ToUniversalTime().ToString('yyyy-MM-dd HH:mm UTC')
            git commit -m "chore: atualiza dados ETL $date"
            Write-Host "git commit codigo de saida: $LASTEXITCODE"
            git push
            Write-Host "git push codigo de saida: $LASTEXITCODE"
          } else {
            Write-Host "Sem alteracoes para commitar."
          }
