name: ETL Oracle → JSON

on:
  schedule:
    - cron: "0 9 * * *"   # Todo dia às 09:00 UTC = 06:00 Brasília
  workflow_dispatch:        # Permite rodar manualmente pelo GitHub

jobs:
  etl:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Rodar ETL
        env:
          DB_USER:                  ${{ secrets.DB_USER }}
          DB_PASSWORD:              ${{ secrets.DB_PASSWORD }}
          DB_DSN:                   ${{ secrets.DB_DSN }}
          DB_MIN_CONNECTIONS:       ${{ secrets.DB_MIN_CONNECTIONS }}
          DB_MAX_CONNECTIONS:       ${{ secrets.DB_MAX_CONNECTIONS }}
          DB_INCREMENT_CONNECTIONS: ${{ secrets.DB_INCREMENT_CONNECTIONS }}
          # ORACLE_CLIENT_PATH não é passado — o runner Linux usa thin mode
        run: python etl.py

      - name: Commitar JSONs gerados
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "chore: atualiza dados ETL $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
