name: ETL Oracle - JSON

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  etl:
    runs-on: self-hosted

    steps:
      - name: Checkout do repositorio
        uses: actions/checkout@v4

      - name: Instalar dependencias Python
        run: pip install -r requirements.txt

      - name: Rodar ETL
        env:
          DB_USER:                  ${{ secrets.DB_USER }}
          DB_PASSWORD:              ${{ secrets.DB_PASSWORD }}
          DB_DSN:                   ${{ secrets.DB_DSN }}
          DB_MIN_CONNECTIONS:       ${{ secrets.DB_MIN_CONNECTIONS }}
          DB_MAX_CONNECTIONS:       ${{ secrets.DB_MAX_CONNECTIONS }}
          DB_INCREMENT_CONNECTIONS: ${{ secrets.DB_INCREMENT_CONNECTIONS }}
          ORACLE_CLIENT_PATH:       ${{ secrets.ORACLE_CLIENT_PATH }}
        run: python etl.py

      - name: Publicar JSON.GZ no GitHub Releases (dados-latest)
        shell: powershell
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          Write-Host "Arquivos gerados em data/gz/"
          Get-ChildItem data\gz\ -ErrorAction SilentlyContinue | Format-Table Name, Length

          # Garante que o release 'dados-latest' existe (cria se necessário)
          $releaseExists = gh release view dados-latest 2>$null
          if ($LASTEXITCODE -ne 0) {
            Write-Host "Release 'dados-latest' nao encontrado. Criando..."
            gh release create dados-latest `
              --title "Dados Latest" `
              --notes "Dados mais recentes gerados pelo ETL. Atualizado automaticamente todos os dias." `
              --latest=false
            Write-Host "Release criado. Codigo de saida: $LASTEXITCODE"
          } else {
            Write-Host "Release 'dados-latest' ja existe. Atualizando arquivos..."
          }

          # Faz upload dos .json.gz com --clobber (sobrescreve arquivos existentes)
          $files = Get-ChildItem data\gz\*.json.gz -ErrorAction SilentlyContinue
          if ($files.Count -eq 0) {
            Write-Host "Nenhum arquivo .json.gz encontrado em data/gz/"
            exit 1
          }

          foreach ($file in $files) {
            Write-Host "Fazendo upload: $($file.Name) ($([math]::Round($file.Length/1MB, 2)) MB)"
            gh release upload dados-latest $file.FullName --clobber
            Write-Host "Upload de $($file.Name) - codigo de saida: $LASTEXITCODE"
          }

          Write-Host "Todos os arquivos publicados no release 'dados-latest'."
