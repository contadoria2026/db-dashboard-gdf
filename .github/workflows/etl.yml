name: ETL Oracle - JSON

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  etl:
    runs-on: self-hosted

    steps:
      - name: Checkout do repositorio
        uses: actions/checkout@v4

      - name: Instalar dependencias Python
        run: pip install -r requirements.txt

      - name: Rodar ETL
        env:
          DB_USER:                  ${{ secrets.DB_USER }}
          DB_PASSWORD:              ${{ secrets.DB_PASSWORD }}
          DB_DSN:                   ${{ secrets.DB_DSN }}
          DB_MIN_CONNECTIONS:       ${{ secrets.DB_MIN_CONNECTIONS }}
          DB_MAX_CONNECTIONS:       ${{ secrets.DB_MAX_CONNECTIONS }}
          DB_INCREMENT_CONNECTIONS: ${{ secrets.DB_INCREMENT_CONNECTIONS }}
          ORACLE_CLIENT_PATH:       ${{ secrets.ORACLE_CLIENT_PATH }}
        run: python etl.py

      - name: Publicar JSON.GZ no GitHub Releases (dados-latest)
        shell: powershell
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          Write-Host "Arquivos gerados em data/gz/"
          Get-ChildItem data\gz\ -ErrorAction SilentlyContinue | Format-Table Name, Length

          $owner = $env:GITHUB_REPOSITORY.Split('/')[0]
          $repo  = $env:GITHUB_REPOSITORY.Split('/')[1]
          $tag   = "dados-latest"

          $headers = @{
            Authorization        = "Bearer $env:GITHUB_TOKEN"
            Accept               = "application/vnd.github+json"
            "X-GitHub-Api-Version" = "2022-11-28"
          }

          # Verifica se o release existe, cria se necessario
          try {
            $release = Invoke-RestMethod -Uri "https://api.github.com/repos/$owner/$repo/releases/tags/$tag" -Headers $headers
            Write-Host "Release '$tag' encontrado. ID: $($release.id)"
          } catch {
            Write-Host "Release '$tag' nao encontrado. Criando..."
            $body = @{ tag_name = $tag; name = "Dados Latest"; body = "Dados mais recentes gerados pelo ETL."; prerelease = $false } | ConvertTo-Json
            $release = Invoke-RestMethod -Uri "https://api.github.com/repos/$owner/$repo/releases" -Method Post -Headers $headers -Body $body -ContentType "application/json"
            Write-Host "Release criado. ID: $($release.id)"
          }

          # Lista assets existentes no release
          $existingAssets = Invoke-RestMethod -Uri "https://api.github.com/repos/$owner/$repo/releases/$($release.id)/assets" -Headers $headers

          # Upload de cada .json.gz (remove versao anterior se existir)
          $files = Get-ChildItem data\gz\*.json.gz -ErrorAction SilentlyContinue
          if ($files.Count -eq 0) {
            Write-Host "Nenhum arquivo .json.gz encontrado em data/gz/"
            exit 1
          }

          foreach ($file in $files) {
            Write-Host "Processando: $($file.Name) ($([math]::Round($file.Length/1MB, 2)) MB)"

            $existing = $existingAssets | Where-Object { $_.name -eq $file.Name }
            if ($existing) {
              Write-Host "  Removendo versao anterior..."
              Invoke-RestMethod -Uri "https://api.github.com/repos/$owner/$repo/releases/assets/$($existing.id)" -Method Delete -Headers $headers
            }

            $uploadHeaders = $headers.Clone()
            $uploadHeaders["Content-Type"] = "application/octet-stream"
            $uploadUrl = "https://uploads.github.com/repos/$owner/$repo/releases/$($release.id)/assets?name=$($file.Name)"
            $fileBytes = [System.IO.File]::ReadAllBytes($file.FullName)
            Invoke-RestMethod -Uri $uploadUrl -Method Post -Headers $uploadHeaders -Body $fileBytes | Out-Null
            Write-Host "  Upload concluido."
          }

          Write-Host "Todos os arquivos publicados no release '$tag'."
