<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Teste Despesa</title>
  <style>
    body { font-family: monospace; padding: 20px; background: #f5f5f5; }
    #log { background: #fff; border: 1px solid #ccc; padding: 16px; white-space: pre-wrap; font-size: 13px; line-height: 1.6; }
    table { border-collapse: collapse; width: 100%; margin-top: 16px; font-size: 12px; }
    th, td { border: 1px solid #ccc; padding: 6px 10px; text-align: left; }
    th { background: #1a3a5c; color: #fff; }
    tr:nth-child(even) { background: #f9f9f9; }
    h3 { margin-top: 24px; }
  </style>
</head>
<body>
<h2>Diagnóstico — despesa.json.gz</h2>
<div id="log">Iniciando...</div>
<div id="tabela"></div>

<script>
var logEl = document.getElementById('log');
function L(msg) { logEl.textContent += '\n' + msg; }

var ANO_ATUAL = 2026;
var MAX_MES   = 4;

var fmt = new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL', minimumFractionDigits: 2 });

L('Buscando ../data/gz/despesa.json.gz ...');

fetch('../data/gz/despesa.json.gz')
  .then(function(r) {
    L('HTTP status: ' + r.status);
    if (!r.ok) throw new Error('HTTP ' + r.status);
    var ds = new DecompressionStream('gzip');
    return new Response(r.body.pipeThrough(ds)).text();
  })
  .then(function(text) {
    var json = JSON.parse(text);
    L('Total registros no JSON: ' + json.dados.length);
    L('atualizado_em: ' + json.atualizado_em);

    var dados = json.dados;
    var r0 = dados[0];
    L('\n=== CAMPOS DO 1o REGISTRO ===');
    Object.keys(r0).forEach(function(k) { L('  ' + k + ' = ' + JSON.stringify(r0[k]) + '  (tipo: ' + typeof r0[k] + ')'); });

    // ---- SIMULAÇÃO EXATA DO DASHBOARD ----

    // Passo 1: filtro de contas (igual ao dashboard)
    var REGISTROS = [];
    dados.forEach(function(r) {
      var cc = String(r.cocontacontabil || '');
      if ((cc >= '522110000' && cc <= '522199999') || (cc >= '622130000' && cc <= '622939999')) {
        REGISTROS.push(r);
      }
    });
    L('\n=== PASSO 1: filtro de contas ===');
    L('REGISTROS.length após filtro: ' + REGISTROS.length);

    // Passo 2: filtro de mês + ano (igual ao aplicarFiltros)
    var mesSel = MAX_MES;
    var filtrados = REGISTROS.filter(function(r) {
      if (r.inmes > mesSel) return false;
      if (r.coexercicio != ANO_ATUAL) return false;
      return true;
    });
    L('\n=== PASSO 2: filtro mes<=4 + ano==2026 ===');
    L('filtrados.length: ' + filtrados.length);

    // Passo 3: calcula dotacao, empenho, liquidada, paga (igual ao atualizarCards)
    var dotacao = 0, empenho = 0, liquidada = 0, paga = 0;
    var dotCount = 0, empCount = 0, liqCount = 0, pagCount = 0;

    filtrados.forEach(function(r) {
      var cc = String(r.cocontacontabil || '');
      if (cc >= '522110000' && cc <= '522199999') { dotacao += r.saldo || 0; dotCount++; }
      if (cc >= '622130000' && cc <= '622139999') { empenho += r.saldo || 0; empCount++; }
      if (cc === '622130300' || cc === '622130400' || cc === '622130700') { liquidada += r.saldo || 0; liqCount++; }
      if (cc === '622920104') { paga += r.saldo || 0; pagCount++; }
    });

    L('\n=== PASSO 3: cálculo dos cards ===');
    L('Dotação   (' + dotCount + ' regs): ' + fmt.format(dotacao));
    L('Empenhada (' + empCount + ' regs): ' + fmt.format(empenho));
    L('Liquidada (' + liqCount + ' regs): ' + fmt.format(liquidada));
    L('Paga      (' + pagCount + ' regs): ' + fmt.format(paga));

    // Passo 4: diagnóstico do campo saldo
    L('\n=== CAMPO saldo — primeiros 10 registros de 2026 (classe 5) ===');
    filtrados.filter(function(r) { return String(r.cocontacontabil || '')[0] === '5'; }).slice(0, 10).forEach(function(r) {
      L('  cc=' + r.cocontacontabil + ' vadebito=' + r.vadebito + ' vacredito=' + r.vacredito + ' saldo=' + r.saldo);
    });

    L('\n=== CAMPO saldo — primeiros 10 registros de 2026 (classe 6, empenhada) ===');
    filtrados.filter(function(r) {
      var cc = String(r.cocontacontabil || '');
      return cc >= '622130000' && cc <= '622139999';
    }).slice(0, 10).forEach(function(r) {
      L('  cc=' + r.cocontacontabil + ' vadebito=' + r.vadebito + ' vacredito=' + r.vacredito + ' saldo=' + r.saldo);
    });

    // Passo 5: alternativa — usar vacredito em vez de saldo para classe 6
    var empAlt = 0, liqAlt = 0, pagAlt = 0, dotAlt = 0;
    filtrados.forEach(function(r) {
      var cc = String(r.cocontacontabil || '');
      if (cc >= '522110000' && cc <= '522199999') dotAlt  += (r.vadebito - r.vacredito) || 0;
      if (cc >= '622130000' && cc <= '622139999') empAlt  += r.vacredito || 0;
      if (cc === '622130300' || cc === '622130400' || cc === '622130700') liqAlt += r.vacredito || 0;
      if (cc === '622920104') pagAlt += r.vacredito || 0;
    });
    L('\n=== ALTERNATIVA: usando vacredito (classe 6) / vadebito-vacredito (classe 5) ===');
    L('Dotação alternativa:   ' + fmt.format(dotAlt));
    L('Empenhada alternativa: ' + fmt.format(empAlt));
    L('Liquidada alternativa: ' + fmt.format(liqAlt));
    L('Paga alternativa:      ' + fmt.format(pagAlt));

    // Tabela: primeiros 30 filtrados
    var campos = ['coexercicio','inmes','coug','cocontacontabil','vadebito','vacredito','saldo','gnd','nome_gnd'];
    var html = '<h3>Primeiros 30 registros filtrados (2026, mes<=4):</h3><table><thead><tr>' +
      campos.map(function(c) { return '<th>' + c + '</th>'; }).join('') + '</tr></thead><tbody>';
    filtrados.slice(0, 30).forEach(function(r) {
      html += '<tr>' + campos.map(function(c) { return '<td>' + (r[c] !== undefined ? r[c] : '') + '</td>'; }).join('') + '</tr>';
    });
    html += '</tbody></table>';
    document.getElementById('tabela').innerHTML = html;
  })
  .catch(function(err) {
    L('ERRO: ' + err.message + '\n' + (err.stack || ''));
  });
</script>
</body>
</html>
